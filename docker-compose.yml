services:
  client:
    image: nerybyservice-client
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "2026:80"
    networks:
      - frontend
    depends_on:
      - server

  server:
    image: nerybyservice-server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3030:3030"
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/nerybyservice
      - REDIS_URL=redis://redis:6379
    networks:
      - frontend
      - backend
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - backend
    # No ports exposed to host

  redis:
    image: redis:latest
    networks:
      - backend
    # No ports exposed to host

networks:
  frontend:
    driver: bridge
  backend:
    internal: true
